appId: com.manifest.app
productName: Manifest
directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
