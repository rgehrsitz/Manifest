appId: com.manifest.app
productName: Manifest
directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json
  - resources/icon.png

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
